<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 620" width="980" height="620">
  <rect x="0" y="0" width="980" height="620" fill="#ffffff"/>

  <!-- IBookingManager interface -->
  <rect x="370" y="20" width="240" height="100" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <line x1="370" y1="56" x2="610" y2="56" stroke="#000000" stroke-width="1"/>
  <text x="490" y="38" font-family="Arial" font-size="13" font-style="italic" text-anchor="middle">&#171;interface&#187;</text>
  <text x="490" y="52" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">IBookingManager</text>
  <text x="380" y="74" font-family="Courier New" font-size="11">+ bookRoom(c, r, in, out)</text>
  <text x="380" y="90" font-family="Courier New" font-size="11">+ cancelBooking(booking)</text>

  <!-- Hotel class -->
  <rect x="40" y="180" width="240" height="170" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <line x1="40" y1="216" x2="280" y2="216" stroke="#000000" stroke-width="1"/>
  <line x1="40" y1="296" x2="280" y2="296" stroke="#000000" stroke-width="1"/>
  <text x="160" y="204" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Hotel</text>
  <text x="50" y="232" font-family="Courier New" font-size="11">- id, name : String</text>
  <text x="50" y="248" font-family="Courier New" font-size="11">- address, phone : String</text>
  <text x="50" y="264" font-family="Courier New" font-size="11">- rooms : List&lt;Room&gt;</text>
  <text x="50" y="280" font-family="Courier New" font-size="11">- bookingCounter : int</text>
  <text x="50" y="312" font-family="Courier New" font-size="11">+ addRoom(room)</text>
  <text x="50" y="328" font-family="Courier New" font-size="11">+ getAvailableRooms()</text>
  <text x="50" y="344" font-family="Courier New" font-size="11">+ findRoomById(no)</text>

  <!-- Room class -->
  <rect x="360" y="180" width="260" height="170" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <line x1="360" y1="216" x2="620" y2="216" stroke="#000000" stroke-width="1"/>
  <line x1="360" y1="296" x2="620" y2="296" stroke="#000000" stroke-width="1"/>
  <text x="490" y="204" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Room</text>
  <text x="370" y="232" font-family="Courier New" font-size="11">- roomNumber : String</text>
  <text x="370" y="248" font-family="Courier New" font-size="11">- roomType : RoomType</text>
  <text x="370" y="264" font-family="Courier New" font-size="11">- pricePerNight : double</text>
  <text x="370" y="280" font-family="Courier New" font-size="11">- available : boolean</text>
  <text x="370" y="312" font-family="Courier New" font-size="11">+ book()</text>
  <text x="370" y="328" font-family="Courier New" font-size="11">+ checkOut()</text>
  <text x="370" y="344" font-family="Courier New" font-size="11">+ isAvailable()</text>

  <!-- Customer class -->
  <rect x="40" y="420" width="240" height="170" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <line x1="40" y1="456" x2="280" y2="456" stroke="#000000" stroke-width="1"/>
  <line x1="40" y1="520" x2="280" y2="520" stroke="#000000" stroke-width="1"/>
  <text x="160" y="444" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Customer</text>
  <text x="50" y="472" font-family="Courier New" font-size="11">- id, name : String</text>
  <text x="50" y="488" font-family="Courier New" font-size="11">- email, phone : String</text>
  <text x="50" y="504" font-family="Courier New" font-size="11">- bookings : List&lt;Booking&gt;</text>
  <text x="50" y="536" font-family="Courier New" font-size="11">+ makeBooking(...)</text>
  <text x="50" y="552" font-family="Courier New" font-size="11">+ cancelBooking(booking)</text>

  <!-- Booking class -->
  <rect x="360" y="420" width="280" height="190" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <line x1="360" y1="456" x2="640" y2="456" stroke="#000000" stroke-width="1"/>
  <line x1="360" y1="552" x2="640" y2="552" stroke="#000000" stroke-width="1"/>
  <text x="500" y="444" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Booking</text>
  <text x="370" y="472" font-family="Courier New" font-size="11">- bookingId : String</text>
  <text x="370" y="488" font-family="Courier New" font-size="11">- checkInDate, checkOutDate : LocalDate</text>
  <text x="370" y="504" font-family="Courier New" font-size="11">- totalCost : double</text>
  <text x="370" y="520" font-family="Courier New" font-size="11">- status : Status</text>
  <text x="370" y="536" font-family="Courier New" font-size="11">  {PENDING,CONFIRMED,CANCELLED}</text>
  <text x="370" y="568" font-family="Courier New" font-size="11">+ confirm()  + cancel()</text>
  <text x="370" y="584" font-family="Courier New" font-size="11">+ calculateTotalCost()</text>

  <!-- BookingException -->
  <rect x="700" y="440" width="230" height="80" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <line x1="700" y1="476" x2="930" y2="476" stroke="#000000" stroke-width="1"/>
  <text x="815" y="458" font-family="Arial" font-size="13" font-weight="bold" text-anchor="middle">BookingException</text>
  <text x="710" y="494" font-family="Courier New" font-size="10">extends Exception</text>
  <text x="710" y="508" font-family="Courier New" font-size="10">(checked, business rules)</text>

  <!-- Relationships -->
  <!-- Hotel implements IBookingManager (dashed line, hollow triangle) -->
  <line x1="280" y1="200" x2="420" y2="120" stroke="#000000" stroke-width="1" stroke-dasharray="6,4"/>
  <polygon points="420,120 405,128 414,138" fill="#ffffff" stroke="#000000" stroke-width="1"/>
  <text x="300" y="150" font-family="Arial" font-size="11" font-style="italic">&#171;implements&#187;</text>

  <!-- Hotel aggregates Room (hollow diamond at Hotel end) -->
  <line x1="280" y1="260" x2="360" y2="260" stroke="#000000" stroke-width="1"/>
  <polygon points="280,260 292,254 304,260 292,266" fill="#ffffff" stroke="#000000" stroke-width="1"/>
  <text x="290" y="252" font-family="Arial" font-size="11">1</text>
  <text x="335" y="252" font-family="Arial" font-size="11">1..*</text>

  <!-- Customer associates Booking -->
  <line x1="280" y1="500" x2="360" y2="500" stroke="#000000" stroke-width="1"/>
  <text x="290" y="492" font-family="Arial" font-size="11">1</text>
  <text x="335" y="492" font-family="Arial" font-size="11">1..*</text>

  <!-- Booking - Room association -->
  <line x1="490" y1="350" x2="490" y2="420" stroke="#000000" stroke-width="1"/>
  <text x="496" y="370" font-family="Arial" font-size="11">1</text>
  <text x="496" y="412" font-family="Arial" font-size="11">1</text>

  <!-- Booking - Customer link (already adjacent via Customer assoc) -->
  <!-- Booking throws BookingException -->
  <line x1="640" y1="490" x2="700" y2="480" stroke="#000000" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="645" y="510" font-family="Arial" font-size="10" font-style="italic">&#171;throws&#187;</text>

  <text x="490" y="610" font-family="Arial" font-size="12" text-anchor="middle" font-style="italic">Figure 1: UML Class Diagram &#8211; Hotel Reservation System</text>
</svg>
